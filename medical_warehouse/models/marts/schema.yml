version: 2

models:
  - name: dim_channels
    description: "Dimension table representing public Telegram channels."
    columns:
      - name: channel_key
        description: "Primary surrogate key generated by MD5 hashing channel name."
        tests:
          - unique
          - not_null
      - name: channel_name
        description: "Name of the Telegram channel."
        tests:
          - not_null

  - name: dim_dates
    description: "Dimension table representing dates."
    columns:
      - name: date_key
        description: "Primary surrogate key in YYYYMMDD format."
        tests:
          - unique
          - not_null

  - name: fct_messages
    description: "Fact table for individual Telegram messages."
    columns:
      - name: message_id
        description: "Unique message identifier from the channel."
        tests:
          - not_null
      - name: channel_key
        description: "Foreign key referencing dim_channels."
        tests:
          - not_null
          - relationships:
              to: ref('dim_channels')
              field: channel_key
      - name: date_key
        description: "Foreign key referencing dim_dates."
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key
